; ZLMediaKit config template for WVP-Pro on Linux / Pop!_OS.
; This container uses host networking, so these ports bind directly on the host.

[api]
apiDebug=1
secret=change-me-zlm-secret

[general]
enableVhost=0
flowThreshold=1024
maxStreamWaitMS=15000
streamNoneReaderDelayMS=5000

[hook]
enable=1
admin_params=secret=change-me-zlm-secret
alive_interval=10.0
on_flow_report=
on_http_access=
on_play=
on_publish=
on_record_mp4=
on_record_ts=
on_rtsp_auth=
on_rtsp_realm=
on_send_rtp_stopped=
on_server_exited=
on_server_keepalive=
on_server_started=
on_shell_login=
on_stream_changed=
on_stream_none_reader=http://127.0.0.1:8080/api/hook/on_stream_none_reader
on_stream_not_found=
on_server_keepalive_interval=10.0
timeoutSec=20

[http]
charSet=utf-8
dir=./www
keepAliveSecond=30
maxReqSize=4096
notFound=<html><head><title>404 Not Found</title></head><body bgcolor="white"><center><h1>Resource Not Found</h1></center></body></html>
port=80
rootPath=./www
sendBufSize=65536
sslport=443

[rtmp]
handshakeSecond=15
keepAliveSecond=15
port=1935
sslport=19350

[rtp_proxy]
dumpDir=
gop_cache=1
h264_pt=98
h265_pt=99
opus_pt=100
port=10000
port_range=30000-40500
ps_pt=96
timeoutSec=15

[rtsp]
authBasic=0
directProxy=1
handshakeSecond=15
keepAliveSecond=15
port=554
sslport=322

[shell]
maxReqSize=1024
port=0
